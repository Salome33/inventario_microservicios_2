server:
  port: 8081

spring:
  application:
    name: auth-service
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:inventory}
    password: ${DB_PASSWORD:inventory}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

security:
  jwt:
    secret: ${JWT_SECRET:SW52ZW50YXJpby1TdXBlci1TZWNyZXQtS2V5LTIwMjYtQmFja2VuZC1NdWNoYXM=}
    access-token-minutes: ${JWT_ACCESS_MINUTES:20}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
